<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2' y='6' width='20' height='14' rx='4' fill='%233b82f6'/><circle cx='9' cy='12' r='2' fill='white'/><circle cx='15' cy='12' r='2' fill='white'/><rect x='10' y='16' width='4' height='1.5' rx='.75' fill='rgba(255,255,255,.7)'/></svg>">
</head>
<body>

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="3" y="9" width="24" height="16" rx="5" fill="#3b82f6"/>
          <circle cx="11" cy="16" r="2.2" fill="white"/>
          <circle cx="19" cy="16" r="2.2" fill="white"/>
          <rect x="12" y="20" width="6" height="2" rx="1" fill="rgba(255,255,255,0.65)"/>
          <rect x="11" y="3" width="8" height="7" rx="3" fill="#2563eb"/>
          <circle cx="11" cy="3.5" r="2" fill="#93c5fd"/>
          <circle cx="19" cy="3.5" r="2" fill="#93c5fd"/>
        </svg>
        <span class="brand-name">Dashboard</span>
      </div>
      <nav class="header-nav" aria-label="Global">
        <a href="https://github.com/yazelin/telegram-copilot-bot" target="_blank" rel="noopener noreferrer"
           class="nav-icon-btn" title="GitHub Repository" aria-label="GitHub Repository">
          <i class="mdi mdi-github" aria-hidden="true"></i>
        </a>
        <a href="https://yazelin.github.io" target="_blank" rel="noopener noreferrer"
           class="nav-icon-btn" title="yazelin.github.io" aria-label="Personal Site">
          <i class="mdi mdi-web" aria-hidden="true"></i>
        </a>
        <span class="nav-sep" aria-hidden="true"></span>
        <button id="btn-settings" class="nav-icon-btn" title="Settings" aria-label="Settings">
          <i class="mdi mdi-cog-outline" aria-hidden="true"></i>
        </button>
        <button id="btn-refresh" class="nav-refresh-btn" title="Refresh" aria-label="Refresh data">
          <i class="mdi mdi-refresh icon-refresh" aria-hidden="true"></i>
        </button>
      </nav>
    </div>
  </header>

  <!-- ── Stats ── -->
  <section class="stats-section" aria-label="Statistics">
    <div class="page-container">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon stat-icon--blue"><i class="mdi mdi-message-text-outline"></i></div>
          <div class="stat-content">
            <div class="stat-num skeleton-text" data-key="totalMessages">—</div>
            <div class="stat-lbl">Messages</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--violet"><i class="mdi mdi-package-variant-closed"></i></div>
          <div class="stat-content">
            <div class="stat-num skeleton-text" data-key="totalApps">—</div>
            <div class="stat-lbl">Apps</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--rose"><i class="mdi mdi-palette-outline"></i></div>
          <div class="stat-content">
            <div class="stat-num skeleton-text" data-key="totalDraws">—</div>
            <div class="stat-lbl">Draws</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon--amber"><i class="mdi mdi-hammer-wrench"></i></div>
          <div class="stat-content">
            <div class="stat-num skeleton-text" data-key="totalBuilds">—</div>
            <div class="stat-lbl">Builds</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Body ── -->
  <div class="body-layout page-container">

    <!-- Repos panel -->
    <section class="panel" aria-label="Repositories">
      <div class="panel-hd">
        <h2 class="panel-title"><i class="mdi mdi-source-repository" aria-hidden="true"></i>Repositories</h2>
      </div>
      <div id="repos-container" class="repos-grid" aria-live="polite">
        <div class="repo-card sk-card" aria-hidden="true">
          <div class="sk-line sk-w70"></div>
          <div class="sk-line sk-w50 sk-sm" style="margin-bottom:14px"></div>
          <div class="sk-bar"></div>
        </div>
        <div class="repo-card sk-card" aria-hidden="true">
          <div class="sk-line sk-w55"></div>
          <div class="sk-line sk-w40 sk-sm" style="margin-bottom:14px"></div>
          <div class="sk-bar"></div>
        </div>
        <div class="repo-card sk-card" aria-hidden="true">
          <div class="sk-line sk-w80"></div>
          <div class="sk-line sk-w60 sk-sm" style="margin-bottom:14px"></div>
          <div class="sk-bar"></div>
        </div>
        <div class="repo-card sk-card" aria-hidden="true">
          <div class="sk-line sk-w65"></div>
          <div class="sk-line sk-w45 sk-sm" style="margin-bottom:14px"></div>
          <div class="sk-bar"></div>
        </div>
      </div>
    </section>

    <!-- Chat panel -->
    <section class="panel panel--chat" aria-label="Chat History">
      <div class="panel-hd">
        <h2 class="panel-title"><i class="mdi mdi-message-text-outline" aria-hidden="true"></i>Chat History</h2>
      </div>
      <div id="chat-messages" class="chat-messages" role="log" aria-live="polite">
        <div class="bubble-row bubble-row--bot" aria-hidden="true"><div class="bubble bubble--bot sk-bubble sk-bubble--md"></div></div>
        <div class="bubble-row bubble-row--user" aria-hidden="true"><div class="bubble bubble--user sk-bubble sk-bubble--sm"></div></div>
        <div class="bubble-row bubble-row--bot" aria-hidden="true"><div class="bubble bubble--bot sk-bubble sk-bubble--lg"></div></div>
        <div class="bubble-row bubble-row--user" aria-hidden="true"><div class="bubble bubble--user sk-bubble sk-bubble--sm"></div></div>
      </div>
    </section>

  </div>

  <!-- ── Settings ── -->
  <div id="settings-overlay" class="settings-overlay" aria-hidden="true"></div>
  <aside id="settings-panel" class="settings-panel" role="dialog" aria-modal="true" aria-label="Settings" aria-hidden="true">
    <div class="settings-hd">
      <h3 class="settings-title">Settings</h3>
      <button id="btn-close-settings" class="icon-btn" aria-label="Close settings">
        <i class="mdi mdi-close" aria-hidden="true"></i>
      </button>
    </div>
    <div class="settings-bd">
      <div class="form-group">
        <label class="form-label" for="input-api-url">Worker API URL</label>
        <input type="url" id="input-api-url" class="form-input" placeholder="https://..." autocomplete="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label class="form-label" for="input-chat-id">Chat ID</label>
        <input type="text" id="input-chat-id" class="form-input" placeholder="850654509" autocomplete="off" inputmode="numeric">
      </div>
    </div>
    <div class="settings-ft">
      <button id="btn-cancel-settings" class="btn btn--ghost">Cancel</button>
      <button id="btn-save-settings" class="btn btn--primary">Save &amp; Refresh</button>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
