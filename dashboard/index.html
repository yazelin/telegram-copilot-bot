<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Copilot Bot — Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%233b82f6' d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2v-2zm1-10c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z'/></svg>">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="header-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="6" fill="#3b82f6"/>
            <path d="M17.05 7.95L9.5 11.5L11 13L7 17L16.05 7.95Z" fill="white" opacity="0.9"/>
            <path d="M12 6C8.69 6 6 8.69 6 12c0 1.66.68 3.16 1.76 4.24l1.42-1.42A4.004 4.004 0 018 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4v2c3.31 0 6-2.69 6-6s-2.69-6-6-6z" fill="white"/>
          </svg>
        </div>
        <h1 class="header-title">Telegram Copilot Bot</h1>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="btn btn-icon" title="Refresh data">
          <i class="mdi mdi-refresh icon-refresh"></i>
          <span class="btn-label">Refresh</span>
        </button>
        <button id="btn-settings" class="btn btn-icon" title="Settings">
          <i class="mdi mdi-cog-outline"></i>
        </button>
      </div>
    </header>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel" aria-hidden="true">
      <div class="settings-inner">
        <h2 class="settings-title">
          <i class="mdi mdi-cog-outline settings-title-icon"></i>
          Settings
        </h2>
        <div class="settings-grid">
          <div class="field">
            <label for="input-api-url">
              <i class="mdi mdi-link-variant field-icon"></i>
              Worker API URL
            </label>
            <input id="input-api-url" type="url" placeholder="https://your-worker.workers.dev" autocomplete="off">
          </div>
          <div class="field">
            <label for="input-org">
              <i class="mdi mdi-github field-icon"></i>
              GitHub Org
            </label>
            <input id="input-org" type="text" placeholder="my-org" autocomplete="off">
          </div>
          <div class="field">
            <label for="input-chat-id">
              <i class="mdi mdi-identifier field-icon"></i>
              Chat ID
            </label>
            <input id="input-chat-id" type="text" placeholder="123456789" autocomplete="off">
          </div>
        </div>
        <div class="settings-actions">
          <button id="btn-save-settings" class="btn btn-primary">
            <i class="mdi mdi-content-save-outline"></i>
            Save
          </button>
          <button id="btn-cancel-settings" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <section class="stats-bar" id="stats-bar">
      <div class="stat-card stat-card--blue" id="stat-messages">
        <div class="stat-icon">
          <i class="mdi mdi-message-text-outline"></i>
        </div>
        <div class="stat-body">
          <span class="stat-value skeleton-text" data-key="totalMessages">&mdash;</span>
          <span class="stat-label">Total Messages</span>
        </div>
      </div>
      <div class="stat-card stat-card--green" id="stat-apps">
        <div class="stat-icon">
          <i class="mdi mdi-package-variant-closed"></i>
        </div>
        <div class="stat-body">
          <span class="stat-value skeleton-text" data-key="totalApps">&mdash;</span>
          <span class="stat-label">Total Apps</span>
        </div>
      </div>
      <div class="stat-card stat-card--purple" id="stat-draws">
        <div class="stat-icon">
          <i class="mdi mdi-palette-outline"></i>
        </div>
        <div class="stat-body">
          <span class="stat-value skeleton-text" data-key="totalDraws">&mdash;</span>
          <span class="stat-label">Total Draws</span>
        </div>
      </div>
      <div class="stat-card stat-card--amber" id="stat-builds">
        <div class="stat-icon">
          <i class="mdi mdi-hammer-wrench"></i>
        </div>
        <div class="stat-body">
          <span class="stat-value skeleton-text" data-key="totalBuilds">&mdash;</span>
          <span class="stat-label">Total Builds</span>
        </div>
      </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Repos Column -->
      <section class="column column-repos">
        <h2 class="column-heading">
          <i class="mdi mdi-source-repository column-heading-icon"></i>
          Repositories
        </h2>
        <div id="repos-container" class="repos-grid">
          <!-- skeleton placeholders -->
          <div class="repo-card skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
          <div class="repo-card skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
          <div class="repo-card skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
          <div class="repo-card skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
        </div>
      </section>

      <!-- Chat Column -->
      <section class="column column-chat">
        <h2 class="column-heading">
          <i class="mdi mdi-chat-outline column-heading-icon"></i>
          Chat History
        </h2>
        <div id="chat-container" class="chat-container">
          <div class="chat-messages" id="chat-messages">
            <!-- skeleton placeholders -->
            <div class="bubble-row bubble-row--bot"><div class="bubble skeleton-bubble"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div></div>
            <div class="bubble-row bubble-row--user"><div class="bubble skeleton-bubble"><div class="skeleton-line w60"></div></div></div>
            <div class="bubble-row bubble-row--bot"><div class="bubble skeleton-bubble"><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
          </div>
        </div>
      </section>

    </main>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
