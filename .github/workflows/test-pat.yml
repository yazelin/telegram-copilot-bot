name: Test FACTORY_PAT

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test FACTORY_PAT permissions
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        run: |
          echo "=== 1. Create test repo ==="
          gh repo create aw-apps/test-pat-permissions --public --description "PAT permission test" 2>&1 || echo "FAILED: create repo"

          echo ""
          echo "=== 2. Check repo exists ==="
          gh repo view aw-apps/test-pat-permissions --json name 2>&1 || echo "FAILED: view repo"

          echo ""
          echo "=== 3. Push a file ==="
          gh api repos/aw-apps/test-pat-permissions/contents/test.txt \
            -X PUT -f message="test" -f content="$(echo 'hello' | base64)" 2>&1 | head -5 || echo "FAILED: push file"

          echo ""
          echo "=== 4. Enable GitHub Pages ==="
          gh api repos/aw-apps/test-pat-permissions/pages \
            -X POST -f "build_type=legacy" -f "source[branch]=main" -f "source[path]=/" 2>&1 || echo "FAILED: enable pages"

          echo ""
          echo "=== 5. Set a secret ==="
          gh secret set TEST_SECRET --body "test123" --repo aw-apps/test-pat-permissions 2>&1 || echo "FAILED: set secret"

          echo ""
          echo "=== 6. Create issue ==="
          gh issue create --repo aw-apps/test-pat-permissions --title "Test issue" --body "test" 2>&1 || echo "FAILED: create issue"

          echo ""
          echo "=== 7. Cleanup - delete test repo ==="
          gh repo delete aw-apps/test-pat-permissions --yes 2>&1 || echo "FAILED: delete repo"

          echo ""
          echo "=== DONE ==="
