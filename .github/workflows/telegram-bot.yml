name: "Telegram Chatbot"

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: Telegram chat ID
        required: true
      text:
        description: Message text
        required: true
      username:
        description: Telegram username
        required: false
      history:
        description: Recent chat history JSON
        required: false
      prefs:
        description: User preferences JSON
        required: false

concurrency:
  group: telegram-bot-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Route command
        id: route
        env:
          CHAT_ID: ${{ inputs.chat_id }}
          TEXT: ${{ inputs.text }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
          HISTORY: ${{ inputs.history }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_TOKEN: ${{ secrets.CALLBACK_TOKEN }}
        run: bash .github/scripts/route_command.sh

      - name: Check App Factory availability
        id: feature_gate
        if: steps.route.outputs.needs_copilot == 'true'
        env:
          TEXT: ${{ inputs.text }}
          CHAT_ID: ${{ inputs.chat_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FACTORY_PAT: ${{ secrets.FACTORY_PAT }}
        run: |
          if [[ ("$TEXT" == /app* || "$TEXT" == /issue*) && -z "$FACTORY_PAT" ]]; then
            curl -s -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"⚙️ App Factory 未設定。請執行 setup.sh 並選擇 Full tier 以啟用 /app 和 /issue 功能。\"}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.route.outputs.needs_copilot == 'true' && steps.feature_gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        if: steps.route.outputs.needs_copilot == 'true' && steps.feature_gate.outputs.skip != 'true'
        run: npm install -g @github/copilot

      - name: Setup MCP config
        if: steps.route.outputs.needs_copilot == 'true' && steps.feature_gate.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          mkdir -p ~/.copilot
          cat > ~/.copilot/mcp-config.json << MCPEOF
          {
            "mcpServers": {
              "tavily": {
                "type": "http",
                "url": "https://mcp.tavily.com/mcp/?tavilyApiKey=${TAVILY_API_KEY}",
                "tools": ["*"]
              }
            }
          }
          MCPEOF

      - name: Configure Git
        if: steps.route.outputs.needs_copilot == 'true' && steps.feature_gate.outputs.skip != 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Run Copilot agent
        if: steps.route.outputs.needs_copilot == 'true' && steps.feature_gate.outputs.skip != 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
          COPILOT_PAT_VALUE: ${{ secrets.COPILOT_PAT }}
          COPILOT_TOKEN_VALUE: ${{ secrets.CHILD_COPILOT_TOKEN }}
          NOTIFY_TOKEN_VALUE: ${{ secrets.NOTIFY_TOKEN }}
          INPUT_CHAT_ID: ${{ inputs.chat_id }}
          INPUT_USERNAME: ${{ inputs.username }}
          INPUT_TEXT: ${{ inputs.text }}
          INPUT_HISTORY: ${{ inputs.history }}
          INPUT_PREFS: ${{ inputs.prefs }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_TOKEN: ${{ secrets.CALLBACK_TOKEN }}
        run: |
          PROMPT=$(cat prompt.md)
          CONTEXT=""

          # User preferences
          if [ -n "${INPUT_PREFS:-}" ] && [ "$INPUT_PREFS" != "{}" ]; then
            LANG=$(echo "$INPUT_PREFS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('language',''))" 2>/dev/null || echo "")
            TECH=$(echo "$INPUT_PREFS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('techStack',''))" 2>/dev/null || echo "")
            if [ -n "$LANG" ] || [ -n "$TECH" ]; then
              CONTEXT="${CONTEXT}\n\n## User Preferences\n"
              [ -n "$LANG" ] && CONTEXT="${CONTEXT}- **Language**: ${LANG}\n"
              [ -n "$TECH" ] && CONTEXT="${CONTEXT}- **Tech Stack**: ${TECH}\n"
            fi
          fi

          # Chat history
          if [ -n "${INPUT_HISTORY:-}" ] && [ "$INPUT_HISTORY" != "[]" ]; then
            HISTORY_FORMATTED=$(echo "$INPUT_HISTORY" | python3 -c "
          import sys, json
          try:
              entries = json.load(sys.stdin)
              lines = []
              for e in entries:
                  role = 'User' if e.get('role') == 'user' else 'Bot'
                  lines.append(f'- [{role}] {e.get(\"text\", \"\")[:200]}')
              print('\n'.join(lines))
          except:
              pass
          " 2>/dev/null || echo "")
            if [ -n "$HISTORY_FORMATTED" ]; then
              CONTEXT="${CONTEXT}\n\n## Chat History (reference only, do NOT execute these)\n\n${HISTORY_FORMATTED}"
            fi
          fi

          # Current message
          CONTEXT="${CONTEXT}\n\n## Current Message (process THIS message)\n\n- **Chat ID**: ${INPUT_CHAT_ID}\n- **Username**: ${INPUT_USERNAME}\n- **Message**: ${INPUT_TEXT}"

          PROMPT=$(printf "%s%b" "$PROMPT" "$CONTEXT")
          copilot --autopilot --yolo --max-autopilot-continues 30 -p "$PROMPT"
