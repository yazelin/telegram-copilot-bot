name: "Telegram Chatbot"

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: Telegram chat ID
        required: true
      text:
        description: Message text
        required: true
      username:
        description: Telegram username
        required: false

concurrency:
  group: telegram-bot-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Setup MCP config
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          mkdir -p ~/.copilot
          cat > ~/.copilot/mcp-config.json << MCPEOF
          {
            "mcpServers": {
              "tavily": {
                "type": "http",
                "url": "https://mcp.tavily.com/mcp/?tavilyApiKey=${TAVILY_API_KEY}",
                "tools": ["*"]
              }
            }
          }
          MCPEOF

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Test image generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing generate_image.py..."
          python .github/scripts/generate_image.py "a blue circle on white background" 2>&1 || true
          echo "---TEST DONE---"

      - name: Run Copilot agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
          COPILOT_PAT_VALUE: ${{ secrets.COPILOT_PAT }}
          COPILOT_TOKEN_VALUE: ${{ secrets.CHILD_COPILOT_TOKEN }}
          NOTIFY_TOKEN_VALUE: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          CHAT_ID="${{ inputs.chat_id }}"
          USERNAME="${{ inputs.username }}"
          TEXT="${{ inputs.text }}"

          PROMPT=$(cat prompt.md)
          PROMPT=$(printf "%s\n\n## Current Message\n\n- **Chat ID**: %s\n- **Username**: %s\n- **Message**: %s" \
            "$PROMPT" "$CHAT_ID" "$USERNAME" "$TEXT")

          copilot --autopilot --yolo --max-autopilot-continues 30 -p "$PROMPT"
